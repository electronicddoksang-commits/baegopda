<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DRM Stream Test</title>

  <script src="https://cdn.jsdelivr.net/npm/shaka-player/dist/shaka-player.compiled.js"></script>
</head>

<body>

<video id="video" width="800" controls autoplay></video>

<script>
async function init() {

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  // 에러 로그
  player.addEventListener('error', (e) => {
    console.error('Shaka Error:', e);
  });

  // 🔐 DRM 설정 (최소 구성)
  player.configure({
    drm: {
      servers: {
        'com.widevine.alpha': 'https://license.doverunner.com/ri/licenseManager.do'
      }
    }
  });

  try {

    // 🚨 핵심 포인트:
    // MPD가 이미 baegopda 경로 포함하고 있음 → 건드리면 깨짐
    await player.load('./stream.mpd');

    console.log('Playback started successfully');

  } catch (e) {
    console.error('Load failed:', e);
  }
}

init();
</script>

</body>
</html>
