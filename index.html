<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DRM Player</title>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player/dist/shaka-player.compiled.js"></script>
</head>

<body>

<video id="video" width="800" controls autoplay></video>

<script>
async function init() {

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  // 에러 로그
  player.addEventListener('error', console.error);

  // DRM (일단 유지)
  player.configure({
    drm: {
      servers: {
        'com.widevine.alpha': 'https://license.doverunner.com/ri/licenseManager.do'
      }
    }
  });

  try {
    // 🚨 핵심: 이제 절대 baegopda 붙이면 안됨
    await player.load('./stream.mpd');
    console.log("loaded");
  } catch (e) {
    console.error(e);
  }
}

init();
</script>

</body>
</html>
