<script>
async function init() {

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  player.configure({
    drm: {
      servers: {
        'com.widevine.alpha': 'https://license.doverunner.com/ri/licenseManager.do'
      }
    }
  });

  // 🔥 핵심 추가 (이게 해결 포인트)
  player.getNetworkingEngine().registerRequestFilter((type, request) => {

    // MPD / segment 요청 모두 base 맞추기
    if (request.uris && request.uris.length > 0) {

      request.uris = request.uris.map(uri => {

        // 이미 절대경로면 그대로
        if (uri.startsWith('http')) return uri;

        // ❗ 핵심: /baegopda/ 기준으로 강제
        return './baegopda/' + uri.replace('./', '');
      });
    }
  });

  await player.load('./baegopda/stream.mpd');
}

init();
</script>
